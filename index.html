<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disrupt Ignite - Leave Calendar 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F0;--surface:#FFF;--border:#E8E4DC;--text-primary:#1A1814;--text-secondary:#6B6560;--text-muted:#9E9890;--approved:#2D6A4F;--approved-light:#B7E4C7;--pending:#C77B1B;--pending-light:#FFE69C;--today-ring:#C43E3E;--weekend:#F0EDE7;--shadow-sm:0 1px 3px rgba(26,24,20,.06);--shadow-md:0 4px 12px rgba(26,24,20,.08);--shadow-lg:0 8px 30px rgba(26,24,20,.12);--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s,visibility .4s}
.loading-screen.hidden{opacity:0;visibility:hidden}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--text-primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{margin-top:16px;font-size:14px;color:var(--text-secondary)}
.header{background:linear-gradient(135deg,#1A1814,#2C2822);color:#fff;padding:28px 40px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-family:'Fraunces',serif;font-weight:700;font-size:24px;letter-spacing:-.5px}
.header h1 span{color:#D4A853}
.header-right{display:flex;align-items:center;gap:20px}
.sync-info{font-size:11px;color:rgba(255,255,255,.45);text-align:right;line-height:1.4}
.sync-info .live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ADE80;margin-right:4px;animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.legend{display:flex;gap:14px;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:rgba(255,255,255,.75)}
.legend-dot{width:10px;height:10px;border-radius:3px}
.legend-dot.approved{background:var(--approved)}.legend-dot.pending{background:var(--pending)}
.filter-bar{max-width:1400px;margin:20px auto 0;padding:0 40px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-bar label{font-size:12px;font-weight:600;color:var(--text-secondary);margin-right:2px}
.filter-btn{padding:5px 13px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.filter-btn:hover{border-color:var(--text-muted)}
.filter-btn.active{background:var(--text-primary);color:#fff;border-color:var(--text-primary)}
.stats-strip{max-width:1400px;margin:16px auto 0;padding:0 40px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-card .num{font-family:'Fraunces',serif;font-size:26px;font-weight:700}
.stat-card .label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.calendar-grid{max-width:1400px;margin:20px auto;padding:0 40px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
.month-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .2s;animation:fadeUp .4s ease-out both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.month-card:nth-child(1){animation-delay:.02s}.month-card:nth-child(2){animation-delay:.05s}.month-card:nth-child(3){animation-delay:.08s}.month-card:nth-child(4){animation-delay:.11s}.month-card:nth-child(5){animation-delay:.14s}.month-card:nth-child(6){animation-delay:.17s}.month-card:nth-child(7){animation-delay:.2s}.month-card:nth-child(8){animation-delay:.23s}.month-card:nth-child(9){animation-delay:.26s}.month-card:nth-child(10){animation-delay:.29s}.month-card:nth-child(11){animation-delay:.32s}.month-card:nth-child(12){animation-delay:.35s}
.month-card:hover{box-shadow:var(--shadow-md)}
.month-header{padding:12px 14px;font-family:'Fraunces',serif;font-weight:600;font-size:15px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.month-header .leave-count{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;color:var(--text-muted);background:var(--bg);padding:2px 8px;border-radius:10px}
.day-labels{display:grid;grid-template-columns:repeat(7,1fr);padding:6px 8px 2px}
.day-label{text-align:center;font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:2px 8px 10px;gap:2px}
.day-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:3px;border-radius:5px;cursor:default;position:relative;min-height:34px;transition:background .1s}
.day-cell.weekend{background:var(--weekend)}.day-cell.empty{background:none}
.day-cell .day-num{font-size:11px;font-weight:500;color:var(--text-primary);line-height:1}
.day-cell.weekend .day-num{color:var(--text-muted)}
.day-cell.today{outline:2px solid var(--today-ring);outline-offset:-2px}
.day-cell.today .day-num{font-weight:700;color:var(--today-ring)}
.day-cell.has-leave{cursor:pointer}.day-cell.has-leave:hover{background:#EDEAE4}
.leave-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:2px;max-width:100%}
.leave-dot{width:5px;height:5px;border-radius:2px}
.leave-dot.approved{background:var(--approved)}.leave-dot.pending{background:var(--pending)}
.tooltip{display:none;position:fixed;z-index:1000;background:var(--text-primary);color:#fff;border-radius:8px;padding:12px 16px;font-size:12px;box-shadow:var(--shadow-lg);max-width:280px;pointer-events:none}
.tooltip.visible{display:block}
.tooltip-title{font-weight:700;font-size:13px;margin-bottom:6px;border-bottom:1px solid rgba(255,255,255,.15);padding-bottom:6px}
.tooltip-entry{display:flex;align-items:center;gap:6px;padding:3px 0}
.tooltip-status{width:6px;height:6px;border-radius:2px;flex-shrink:0}
.tooltip-status.approved{background:var(--approved-light)}.tooltip-status.pending{background:var(--pending-light)}
.tooltip-name{font-weight:600}.tooltip-type{color:rgba(255,255,255,.5);margin-left:auto;font-size:11px}
.tooltip-reason{color:rgba(255,255,255,.45);font-size:11px;font-style:italic;padding-left:12px}
@media(max-width:768px){.header{padding:16px}.header h1{font-size:18px}.filter-bar,.stats-strip,.calendar-grid{padding-left:16px;padding-right:16px}.calendar-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="loading-spinner"></div><div class="loading-text">Syncing leave data from Google Sheets...</div></div>
<div id="app" style="display:none">
<div class="header"><div class="header-inner">
<h1>Disrupt Ignite <span>&middot;</span> Leave Calendar <span>2026</span></h1>
<div class="header-right">
<div class="sync-info" id="syncInfo"><span class="live-dot"></span> Live from Google Sheets<br><span id="lastSync"></span></div>
<div class="legend"><div class="legend-item"><div class="legend-dot approved"></div> Approved</div><div class="legend-item"><div class="legend-dot pending"></div> Pending</div></div>
</div></div></div>
<div class="filter-bar" id="filterBar"><label>Filter:</label><button class="filter-btn active" data-filter="all">All</button></div>
<div class="stats-strip" id="statsStrip"></div>
<div class="calendar-grid" id="calendarGrid"></div>
<div class="tooltip" id="tooltip"></div>
</div>
<script>
var SHEET_CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vR7aP76QfN6g5IbD_067V8I3oK0F6XMpxAZsJ3NNVEF7IP4mCLmGoQBa4nVzQMRNgCXl_ljv1_kS313/pub?gid=1472982542&single=true&output=csv';

function parseCSV(t){var rows=[],i=0;while(i<t.length){var row=[];while(i<t.length){if(t[i]==='"'){var v='';i++;while(i<t.length){if(t[i]==='"'&&t[i+1]==='"'){v+='"';i+=2}else if(t[i]==='"'){i++;break}else{v+=t[i];i++}}row.push(v);if(t[i]===',')i++}else{var v='';while(i<t.length&&t[i]!==','&&t[i]!=='\n'&&t[i]!=='\r'){v+=t[i];i++}row.push(v);if(t[i]===',')i++}if(t[i]==='\n'||t[i]==='\r'){if(t[i]==='\r'&&t[i+1]==='\n')i++;i++;break}}if(row.length>1||(row.length===1&&row[0].trim()))rows.push(row)}return rows}

// NEW: Extract display name from Column E value
// "Ploy (Designer) leave" -> "Ploy (Designer)"
// "BB leave" -> "BB"
// "Kang Leave" -> "Kang"
// Keeps parenthetical info to distinguish staff
function displayName(colE){
  if(!colE)return'';
  var s=colE.trim();
  var m=s.match(/^(.+?)\s*[Ll]eave\s*$/);
  if(m)return m[1].trim();
  return s;
}

function parseDateStr(s){
  if(!s)return null;
  var m=String(s).match(/^(\d{4}-\d{2}-\d{2})/);
  if(m)return m[1];
  return null;
}

function normalizeStatus(s){if(!s)return'';var l=s.toLowerCase().trim();if(l==='approved')return'Approved';if(l.indexOf('waiting')>=0||l.indexOf('pending')>=0)return'Pending';return s.trim()}

// NEW: processData now uses the FULL Column E value as the key
// and displayName() for the visible label
function processData(rows){
  if(rows.length<2)return[];
  var h=rows[0].map(function(x){return x.trim().toLowerCase()});
  var cName=-1;for(var i=0;i<h.length;i++){if(h[i]==='name'){cName=i;break}}
  var cStart=-1,cEnd=-1;
  for(var i=h.length-1;i>=0;i--){if(cStart===-1&&h[i]==='start date')cStart=i;if(cEnd===-1&&h[i]==='end date')cEnd=i}
  var cStatus=-1;for(var i=0;i<h.length;i++){if(h[i].indexOf('leave status')>=0){cStatus=i;break}}
  var cType=-1;for(var i=0;i<h.length;i++){if(h[i].indexOf('type of leave')>=0){cType=i;break}}
  var cReason=-1;for(var i=0;i<h.length;i++){if(h[i].indexOf('\u0e2d\u0e37\u0e48\u0e19')>=0){cReason=i;break}}

  var rec=[];
  for(var i=1;i<rows.length;i++){
    var r=rows[i];if(!r||r.length<5)continue;
    var rawName=String(r[cName]).trim();
    var name=displayName(rawName); // Display name: "Ploy (Designer)"
    if(!name)continue;
    var sd=parseDateStr(r[cStart]);var ed=parseDateStr(r[cEnd]);
    var st=normalizeStatus(r[cStatus]);
    var tp=(cType>=0&&r[cType])?r[cType].trim():'';
    var rs=(cReason>=0&&r[cReason])?r[cReason].trim():'';
    if(!sd||!ed)continue;
    if(st!=='Approved'&&st!=='Pending')continue;
    if(sd.indexOf('2026')!==0)continue;
    rec.push({name:name,start:sd,end:ed,status:st,type:tp,reason:rs});
  }
  return rec;
}

function expandLeaves(data){
  var entries=[];
  data.forEach(function(r){
    var s=new Date(r.start+'T12:00:00');var e=new Date(r.end+'T12:00:00');var cur=new Date(s);
    while(cur<=e){
      var yyyy=cur.getFullYear();var mm=String(cur.getMonth()+1).padStart(2,'0');var dd=String(cur.getDate()).padStart(2,'0');
      entries.push(Object.assign({},r,{date:yyyy+'-'+mm+'-'+dd}));cur.setDate(cur.getDate()+1);
    }
  });return entries;
}

function buildLookup(entries){var map={};entries.forEach(function(e){if(!map[e.date])map[e.date]=[];map[e.date].push(e)});return map}

var allEntries=[],lookup={},activePerson='all';

// NEW: filters are auto-generated from data - any new employee appears automatically
function renderFilters(entries){
  var fb=document.getElementById('filterBar');
  fb.querySelectorAll('.filter-btn:not([data-filter="all"])').forEach(function(b){b.remove()});
  var people=[].concat(Array.from(new Set(entries.map(function(e){return e.name})))).sort();
  people.forEach(function(p){
    var btn=document.createElement('button');
    btn.className='filter-btn'+(activePerson===p?' active':'');
    btn.dataset.filter=p;btn.textContent=p;fb.appendChild(btn);
  });
}

document.getElementById('filterBar').addEventListener('click',function(e){
  if(!e.target.classList.contains('filter-btn'))return;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  e.target.classList.add('active');activePerson=e.target.dataset.filter;applyFilter();
});

function applyFilter(){
  var f=activePerson==='all'?allEntries:allEntries.filter(function(x){return x.name===activePerson});
  lookup=buildLookup(f);renderStats(f);renderCalendar();
}

function renderStats(entries){
  var s=document.getElementById('statsStrip');
  var uniq=function(a){return new Set(a.map(function(e){return e.name+e.start+e.end})).size};
  var ap=entries.filter(function(e){return e.status==='Approved'});
  var pe=entries.filter(function(e){return e.status==='Pending'});
  s.innerHTML='<div class="stat-card"><div class="num">'+uniq(entries)+'</div><div class="label">Total Requests</div></div>'+
    '<div class="stat-card"><div class="num" style="color:var(--approved)">'+uniq(ap)+'</div><div class="label">Approved</div></div>'+
    '<div class="stat-card"><div class="num" style="color:var(--pending)">'+uniq(pe)+'</div><div class="label">Pending</div></div>'+
    '<div class="stat-card"><div class="num">'+new Set(entries.map(function(e){return e.name})).size+'</div><div class="label">Employees</div></div>';
}

var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var today=new Date();
var todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

function renderCalendar(){
  var grid=document.getElementById('calendarGrid');grid.innerHTML='';
  for(var m=0;m<12;m++){
    var card=document.createElement('div');card.className='month-card';
    var prefix='2026-'+String(m+1).padStart(2,'0');
    var mKeys=Object.keys(lookup).filter(function(k){return k.indexOf(prefix)===0});
    var total=mKeys.reduce(function(s,k){return s+lookup[k].length},0);
    var hh='<div class="month-header">'+MONTHS[m];
    if(total>0)hh+='<span class="leave-count">'+total+' leave day'+(total>1?'s':'')+'</span>';
    hh+='</div><div class="day-labels">'+DAYS.map(function(d){return'<div class="day-label">'+d+'</div>'}).join('')+'</div>';
    card.innerHTML=hh;
    var dg=document.createElement('div');dg.className='days-grid';
    var fd=new Date(2026,m,1);var si=fd.getDay()===0?6:fd.getDay()-1;
    var dim=new Date(2026,m+1,0).getDate();
    for(var i=0;i<si;i++){var emp=document.createElement('div');emp.className='day-cell empty';dg.appendChild(emp)}
    for(var d=1;d<=dim;d++){
      var ds='2026-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var dow=new Date(2026,m,d).getDay();var isW=dow===0||dow===6;var isT=ds===todayStr;
      var dl=lookup[ds]||[];
      var cell=document.createElement('div');
      var cls='day-cell';if(isW)cls+=' weekend';if(isT)cls+=' today';if(dl.length>0)cls+=' has-leave';
      cell.className=cls;
      var ih='<span class="day-num">'+d+'</span>';
      if(dl.length>0){ih+='<div class="leave-dots">';dl.forEach(function(l){ih+='<div class="leave-dot '+(l.status==='Approved'?'approved':'pending')+'"></div>'});ih+='</div>'}
      cell.innerHTML=ih;
      if(dl.length>0){(function(dateStr,leaves){
        cell.addEventListener('mouseenter',function(ev){showTooltip(ev,dateStr,leaves)});
        cell.addEventListener('mouseleave',hideTooltip);
        cell.addEventListener('touchstart',function(ev){ev.preventDefault();showTooltip(ev,dateStr,leaves)});
      })(ds,dl)}
      dg.appendChild(cell);
    }
    card.appendChild(dg);grid.appendChild(card);
  }
}

var tooltip=document.getElementById('tooltip');
function showTooltip(ev,dateStr,leaves){
  var p=dateStr.split('-');var d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  var fmt=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  var h='<div class="tooltip-title">'+fmt+'</div>';
  leaves.forEach(function(l){
    var c=l.status==='Approved'?'approved':'pending';
    var tag=l.status==='Pending'?' <span style="color:#FFE69C">(pending)</span>':'';
    h+='<div class="tooltip-entry"><div class="tooltip-status '+c+'"></div><span class="tooltip-name">'+l.name+tag+'</span><span class="tooltip-type">'+l.type+'</span></div>';
    if(l.reason)h+='<div class="tooltip-reason">'+l.reason+'</div>';
  });
  tooltip.innerHTML=h;tooltip.classList.add('visible');
  var rect=ev.target.closest('.day-cell').getBoundingClientRect();
  var x=rect.right+8,y=rect.top;
  if(x+280>window.innerWidth)x=rect.left-288;
  if(y+200>window.innerHeight)y=window.innerHeight-210;
  tooltip.style.left=x+'px';tooltip.style.top=y+'px';
}
function hideTooltip(){tooltip.classList.remove('visible')}
document.addEventListener('touchstart',function(e){if(!e.target.closest('.day-cell.has-leave'))hideTooltip()});

async function loadData(){
  var le=document.getElementById('loadingScreen');var ae=document.getElementById('app');
  try{
    var res=await fetch(SHEET_CSV_URL);
    if(!res.ok)throw new Error('HTTP '+res.status);
    var text=await res.text();
    var rows=parseCSV(text);
    var records=processData(rows);
    allEntries=expandLeaves(records);
    lookup=buildLookup(allEntries);
    renderFilters(allEntries);renderStats(allEntries);renderCalendar();
    document.getElementById('lastSync').textContent='Updated '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    le.classList.add('hidden');ae.style.display='block';
  }catch(err){
    console.error('Fetch error:',err);
    // No hardcoded fallback - show empty calendar with message
    allEntries=[];lookup={};
    renderFilters(allEntries);renderStats(allEntries);renderCalendar();
    document.getElementById('lastSync').textContent='Could not load data';
    le.classList.add('hidden');ae.style.display='block';
  }
}

loadData();
setInterval(loadData,5*60*1000);
</script>
</body>
</html>
